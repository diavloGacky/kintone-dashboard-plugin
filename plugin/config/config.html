<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボードビルダー</title>
</head>
<body>
<div id="cfg-app">

  <!-- ヘッダー -->
  <header id="cfg-header">
    <div class="hd-brand">📊 ダッシュボードビルダー</div>
    <div class="hd-conn">
      <input type="text"   id="api-token" placeholder="APIトークン">
      <input type="number" id="app-id"    placeholder="アプリID" min="1">
      <button id="btn-load-data" class="btn btn-load">データ読み込み</button>
      <span id="load-status" class="load-status"></span>
    </div>
    <div class="hd-view">
      <select id="target-view">
        <option value="">すべての一覧に表示</option>
      </select>
    </div>
    <div class="hd-actions">
      <button id="btn-save"   class="btn btn-save">💾 保存</button>
      <button id="btn-cancel" class="btn btn-cancel">キャンセル</button>
    </div>
  </header>

  <!-- ボディ：3パネル -->
  <div id="cfg-body">

    <!-- 左：ウィジェットパレット -->
    <aside id="cfg-palette">
      <div class="palette-title">ウィジェット</div>
      <div class="palette-hint">クリックで追加</div>
      <div class="palette-items">
        <div class="palette-item" data-type="number_card">
          <span class="pi-icon">🔢</span>
          <span class="pi-label">数値カード</span>
        </div>
        <div class="palette-item" data-type="table">
          <span class="pi-icon">📋</span>
          <span class="pi-label">テーブル</span>
        </div>
        <div class="palette-item" data-type="bar_chart">
          <span class="pi-icon">📊</span>
          <span class="pi-label">棒グラフ</span>
        </div>
        <div class="palette-item" data-type="pie_chart">
          <span class="pi-icon">🥧</span>
          <span class="pi-label">円グラフ</span>
        </div>
        <div class="palette-item" data-type="filter">
          <span class="pi-icon">🔍</span>
          <span class="pi-label">フィルタ</span>
        </div>
      </div>
      <div class="palette-sep"></div>
      <div class="palette-tip">
        <p>💡 <b>操作方法</b></p>
        <p>・クリック → キャンバスに追加</p>
        <p>・ヘッダーをドラッグ → 移動</p>
        <p>・右下をドラッグ → リサイズ</p>
        <p>・ウィジェットをクリック → 設定</p>
      </div>
    </aside>

    <!-- 中央：キャンバス -->
    <main id="cfg-canvas">
      <div id="canvas-empty" class="canvas-empty">
        <div class="ce-icon">📊</div>
        <div class="ce-text">左のパレットからウィジェットを追加してください</div>
        <div class="ce-sub">データを読み込むとリアルタイムでプレビューが表示されます</div>
      </div>
      <div id="cfg-grid" class="grid-stack"></div>
    </main>

    <!-- 右：プロパティパネル -->
    <aside id="cfg-props" class="hidden">
      <div class="props-header">
        <span id="props-title-label">ウィジェット設定</span>
        <button id="props-close" class="props-close-btn">✕</button>
      </div>
      <div class="props-body">
        <div class="prop-row">
          <label>タイトル</label>
          <input type="text" id="p-title" placeholder="ウィジェット名">
        </div>

        <!-- 数値カード -->
        <div class="prop-section hidden" id="ps-number_card">
          <div class="prop-row">
            <label>フィールド</label>
            <select id="p-nc-field"><option value="">選択してください</option></select>
          </div>
          <div class="prop-row">
            <label>集計</label>
            <select id="p-nc-agg">
              <option value="COUNT">件数</option>
              <option value="SUM">合計</option>
              <option value="AVG">平均</option>
            </select>
          </div>
          <div class="prop-row">
            <label>単位</label>
            <input type="text" id="p-nc-unit" placeholder="例: 件、円">
          </div>
        </div>

        <!-- テーブル -->
        <div class="prop-section hidden" id="ps-table">
          <div class="prop-row">
            <label>表示フィールド</label>
            <div class="prop-chk-list" id="p-table-fields"></div>
          </div>
          <div class="prop-row">
            <label>最大件数</label>
            <input type="number" id="p-table-limit" value="20" min="1" max="500">
          </div>
        </div>

        <!-- 棒グラフ -->
        <div class="prop-section hidden" id="ps-bar_chart">
          <div class="prop-row">
            <label>X軸（分類）</label>
            <select id="p-bar-x"><option value="">選択してください</option></select>
          </div>
          <div class="prop-row">
            <label>Y軸（数値）</label>
            <select id="p-bar-y"><option value="">選択してください</option></select>
          </div>
          <div class="prop-row">
            <label>集計</label>
            <select id="p-bar-agg">
              <option value="SUM">合計</option>
              <option value="COUNT">件数</option>
              <option value="AVG">平均</option>
            </select>
          </div>
        </div>

        <!-- 円グラフ -->
        <div class="prop-section hidden" id="ps-pie_chart">
          <div class="prop-row">
            <label>分類フィールド</label>
            <select id="p-pie-label"><option value="">選択してください</option></select>
          </div>
          <div class="prop-row">
            <label>数値フィールド</label>
            <select id="p-pie-value"><option value="">選択してください</option></select>
          </div>
          <div class="prop-row">
            <label>集計</label>
            <select id="p-pie-agg">
              <option value="SUM">合計</option>
              <option value="COUNT">件数</option>
            </select>
          </div>
        </div>

        <!-- フィルタ -->
        <div class="prop-section hidden" id="ps-filter">
          <div class="prop-row">
            <label>種別</label>
            <select id="p-filter-type">
              <option value="date_range">日付範囲</option>
              <option value="dropdown">ドロップダウン</option>
              <option value="text">テキスト</option>
            </select>
          </div>
          <div class="prop-row">
            <label>対象フィールド</label>
            <select id="p-filter-field"><option value="">選択してください</option></select>
          </div>
        </div>

        <button id="btn-apply-props" class="btn btn-apply">適用してプレビュー更新</button>
        <button id="btn-delete-widget" class="btn btn-del-widget">🗑 このウィジェットを削除</button>
      </div>
    </aside>

  </div><!-- /cfg-body -->
</div><!-- /cfg-app -->
</body>
</html>
